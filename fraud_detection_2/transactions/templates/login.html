<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#5a8dee,#3b5bdb);
}

.box{
    background:white;
    padding:25px;
    width:260px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:15px;
}

/* Inputs */
input{
    width:100%;
    padding:8px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

input:focus{
    border-color:#5a8dee;
}

/* Button */
button{
    width:100%;
    padding:8px;
    background:#5a8dee;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#3b5bdb;
}

/* Footer */
.small{
    margin-top:10px;
    font-size:12px;
    color:#777;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">
{% csrf_token %}

<input type="text" placeholder="Username" name="username" required>
<input type="password" placeholder="Password" name="password" required>

<button type="submit">Login</button>

</form>

<div class="small">Secure login</div>

</div>

</body>
</html>
